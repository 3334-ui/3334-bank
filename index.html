    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif
        }

        html,
        body,
        #root {
            height: 100%;
            min-height: -webkit-fill-available;
            width: 100%;
            overflow: hidden;
            background: #F2F2F7;
            margin: 0;
            padding: 0;
        }
        @supports (height: 100dvh) {
            html, body, #root { height: 100dvh; }
        }
        .fixed { position: fixed; }
        @media screen and (max-width: 360px) {
            body { font-size: 14px; }
        }

        .scroll-ios {
            -webkit-overflow-scrolling: touch;
            overflow-y: auto
        }

        .press {
            transition: opacity .12s, transform .12s
        }

        .press:active {
            opacity: .55;
            transform: scale(.95)
        }

        @keyframes slideR {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.94)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-8px)
            }

            40%,
            80% {
                transform: translateX(8px)
            }
        }

        @keyframes loadBar {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(.5);
                opacity: 0
            }

            60% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes checkDraw {
            to {
                stroke-dashoffset: 0
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes ringIn {
            from {
                transform: scale(.3);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .screen-r {
            animation: slideR .28s ease-out
        }

        .modal-up {
            animation: slideUp .32s cubic-bezier(.34, 1.1, .64, 1)
        }

        .splash-in {
            animation: fadeIn .6s ease
        }

        .safe-top {
            padding-top: max(44px, env(safe-area-inset-top, 44px))
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none
        }

        input {
            outline: none;
            background: transparent;
            border: none;
            width: 100%
        }

        ::-webkit-scrollbar {
            display: none
        }
    </style>
</head>

        async function serverLoad() {
            try {
                const [cfgRes, stateRes] = await Promise.all([
                    fetch('/api/cfg').catch(() => null),
                    fetch('/api/state').catch(() => null)
                ]);
                const cfgJson = cfgRes && cfgRes.ok ? await cfgRes.json() : null;
                if (cfgJson && cfgJson.accounts && cfgJson.pin) CFG = cfgJson;
                const stateJson = stateRes && stateRes.ok ? await stateRes.json() : null;
                const transfers = (stateJson && stateJson.transfers) ? stateJson.transfers : CFG.seedTransfers;
                const initBal = {};
                CFG.accounts.forEach(a => { initBal[a.id] = a.balance; });
                const balances = (stateJson && stateJson.balances) ? { ...initBal, ...stateJson.balances } : initBal;
                return { transfers, balances };
            } catch (e) {
                const initBal = {};
                CFG.accounts.forEach(a => { initBal[a.id] = a.balance; });
                return { transfers: CFG.seedTransfers, balances: initBal };
            }
